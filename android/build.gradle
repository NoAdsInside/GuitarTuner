// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  ext {
    // These were previously supplied by the Expo `expo-root-project` gradle plugin.
    // With Expo removed they must be declared here for app/build.gradle to read via
    // rootProject.ext.*. Values match the React Native 0.86 template defaults
    // (compile/target SDK 36 for the Android 16 Play Store requirement).
    buildToolsVersion = "36.0.0"
    minSdkVersion = 24
    compileSdkVersion = 36
    targetSdkVersion = 36
    ndkVersion = "27.1.12297006"
    kotlinVersion = "2.1.20"
  }
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

def reactNativeAndroidDir = new File(
  providers.exec {
    workingDir(rootDir)
    commandLine("node", "--print", "require.resolve('react-native/package.json')")
  }.standardOutput.asText.get().trim(),
  "../android"
)

allprojects {
  repositories {
    maven {
      // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
      url = reactNativeAndroidDir
    }

    google()
    mavenCentral()
    maven { url = 'https://www.jitpack.io' }
  }
}

apply plugin: "com.facebook.react.rootproject"
